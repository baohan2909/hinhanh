      slider('fContact','Đậm bóng tiếp đất',0,70,f.contact)+
      slider('fSWidth','Rộng bóng',50,110,f.sWidth??78)+
      slider('fShX','Lệch bóng ngang',-30,30,f.shX??0)+
      slider('fSOp','Bóng mềm phụ',0,40,f.sOp)+
      slider('fSBlur','Độ nhòe bóng phụ',6,60,f.sBlur)+
      slider('fSDist','Khoảng đổ phụ',0,40,f.sDist)+
      slider('fGloss','Độ bóng sản phẩm',0,60,f.gloss)+
      `<button class="btn sm full" id="fCopy" style="margin-top:8px">Áp thiết lập cho tất cả</button>
      <p class="hint">Bóng tiếp đất dính ngay đáy sản phẩm; bóng mềm phụ để 0 nếu muốn nền thật sạch.</p>`);
    h+=presetCard();
  }
  if(S.step===4){
    const sizeRows=S.exp.sizes.map((s,i)=>`<div class="size-it">
      <span class="sw"><input type="checkbox" data-son="${i}" ${s.on?'checked':''}><i></i></span>
      <input type="number" data-sw="${i}" value="${s.w}"><span class="mul">×</span>
      <input type="number" data-sh="${i}" value="${s.h}">
      <button class="x" data-sdel="${i}">×</button></div>`).join('');
    h+=card('Kích thước xuất',ICO.out,
      sizeRows+
      `<button class="btn sm full" id="szAdd" style="margin:2px 0 10px">+ Thêm kích thước</button>`+
      slider('exPad','Lề trắng (%)',0,25,S.exp.pad)+
      `<div class="row"><label>Nền</label><select id="exBg" style="flex:1.4;width:auto">
        <option value="white" ${S.exp.bgMode==='white'?'selected':''}>Trắng</option>
        <option value="trans" ${S.exp.bgMode==='trans'?'selected':''}>Trong suốt (PNG)</option></select></div>
      <div class="row"><label>Định dạng</label><select id="exFmt" style="flex:1.4;width:auto" ${S.exp.bgMode==='trans'?'disabled':''}>
        <option value="jpg" ${S.exp.fmt==='jpg'?'selected':''}>JPG</option>
        <option value="png" ${S.exp.fmt==='png'?'selected':''}>PNG</option></select></div>`+
      slider('exQ','Chất lượng',70,100,S.exp.q)+
      `<div class="row" style="margin-top:2px"><label>AI upscale 2× (Swin2SR)</label><span class="sw"><input type="checkbox" id="exSr" ${S.exp.sr?'checked':''}><i></i></span></div>
      <div class="row"><label>Mẫu tên file</label></div>
      <input type="text" id="exPat" value="${S.exp.pat}">
      <p class="hint">Từ khóa: {ten} · {w} {h} · {stt}. Nhiều kích thước sẽ chia thư mục trong ZIP.</p>`);
    h+=card('Xuất ảnh',ICO.out,`
      <div class="btn-row">
        <button class="btn" id="exOne" ${!it||!it.cut?'disabled':''}>Ảnh này</button>
        <button class="btn gold" id="exAllB">Tất cả (ZIP)</button></div>`);
    h+=presetCard();
  }
  p.innerHTML=h;
  bindPanel();
}

function bindPanel(){
  const it=cur();
  const on=(id,ev,fn)=>{const el=$('#'+id);if(el)el[ev]=fn};
  const bindSlider=(id,fn,live=true)=>{const el=$('#'+id);if(!el)return;
    el.oninput=()=>{$('#'+id+'V').textContent=el.value;fn(+el.value);if(live)renderStage()}};
  // step 0
  on('btnPick','onclick',()=>$('#fileIn').click());
  on('btnCam','onclick',()=>$('#camIn').click());
  on('btnGo1','onclick',()=>goStep(1));
  on('btnAuto','onclick',()=>{goStep(1);setTimeout(autoRun,50)});
  const drop=$('#drop');
  if(drop){drop.onclick=()=>$('#fileIn').click();
    drop.ondragover=e=>{e.preventDefault();drop.classList.add('hover')};
    drop.ondragleave=()=>drop.classList.remove('hover');
    drop.ondrop=e=>{e.preventDefault();drop.classList.remove('hover');addFiles(e.dataTransfer.files)}}
  // step 1
  on('engSel','onchange',()=>{S.engine=$('#engSel').value;save('nsf_engine',S.engine)});
  on('btnCutAll','onclick',runCutAll);
  on('btnCutOne','onclick',async()=>{if(!it)return;S.busy=true;it.running=true;renderRail();
    setProg(0,'Đang tách: '+it.name);
    try{await removeBg(it,(p,lb)=>setProg(p,lb||('Đang tách: '+it.name)))}
    catch(e){console.error(e);toast('Lỗi tách nền')}
    setProg(-1);it.running=false;S.busy=false;renderAll()});
  bindSlider('edSmooth',v=>{it.edge.smooth=v;applyEdge(it)});
  bindSlider('edSharp',v=>{it.edge.sharp=v;applyEdge(it)});
  on('edCopy','onclick',()=>{S.items.forEach(x=>{if(x===it||!x.cutRaw)return;x.edge={...it.edge};applyEdge(x)});toast('Đã áp viền cho tất cả');renderAll()});
  on('btnBr2','onclick',openBrush);
  on('btnCv2','onclick',openCurve);
  on('rL','onclick',()=>xformItem(it,(c,bg)=>rotCanvas(c,-90,bg)));
  on('rR','onclick',()=>xformItem(it,(c,bg)=>rotCanvas(c,90,bg)));
  on('rF','onclick',()=>xformItem(it,(c,bg)=>flipCanvas(c,bg)));
  {const el=$('#rAng');
   if(el){el.oninput=()=>{$('#rAngV').textContent=el.value};
     el.onchange=()=>{const a=+el.value;if(!a)return;
       xformItem(it,(c,bg)=>rotCanvas(c,a,bg));
       el.value=0;$('#rAngV').textContent='0';toast('Đã xoay '+a+'°')};}}
  // step 2
  $$('.tpl-it').forEach(el=>{
    el.onclick=e=>{
      if(e.target.dataset.del!=null){S.templates.splice(+e.target.dataset.del,1);saveTpl();renderPanel();renderStage();return}
      if(it){it.align.tpl=+el.dataset.i;renderPanel();renderStage()}};
  });
  on('btnTplAdd','onclick',()=>$('#tplIn').click());
  on('alOn','onchange',()=>{it.align.on=$('#alOn').checked;it.aligned=null;dirty(it);
    if(it.align.on&&it.align.tpl==null&&S.templates.length)it.align.tpl=0;
    if(it.align.on)bakeAlign(it);
    if(!it.align.on)it.done[2]=true;renderPanel();renderStage()});
  on('alAuto','onclick',()=>{autoAlign(it,false);bakeAlign(it);renderPanel();renderStage()});
  on('alAutoR','onclick',()=>{autoAlign(it,true);bakeAlign(it);renderPanel();renderStage()});
  bindSlider('alSc',v=>{it.align.sc=v/100;bakeAlign(it)});
  bindSlider('alRot',v=>{it.align.rot=v;bakeAlign(it)});
  bindSlider('alTx',v=>{it.align.tx=v;bakeAlign(it)});
  bindSlider('alTy',v=>{it.align.ty=v;bakeAlign(it)});
  // step 3
  on('smOne','onclick',()=>{if(smartAuto(it)){toast('AI đã cân chỉnh ảnh này');renderAll()}});
  on('smAll','onclick',smartAutoAll);
  on('dpOne','onclick',()=>{if(smartDeep(it)){toast('AI đã hoàn thiện ảnh này');renderAll()}});
  on('dpAll','onclick',smartDeepAll);
  on('fAuto','onchange',()=>{it.fin.auto=$('#fAuto').checked;it.lut=null;dirty(it);renderStage()});
  on('fSync','onchange',()=>{S.sync=$('#fSync').checked;toast(S.sync?'Kéo slider sẽ áp cho tất cả ảnh':'Chỉnh riêng từng ảnh')});
  on('fEcom','onclick',()=>{
    const set=x=>{Object.assign(x.fin,{contact:40,sWidth:76,sOp:0,sDist:5,posY:4,gloss:0})};
    if(S.sync)S.items.forEach(set);else set(it);
    renderPanel();renderStage();toast('Đã áp bóng chuẩn sàn TMĐT');
  });
  on('fXfReset','onclick',()=>{
    const set=x=>{Object.assign(x.fin,{rot:0,zoom:100,offX:0,posY:3})};
    if(S.sync)S.items.forEach(set);else set(it);
    renderPanel();renderStage();
  });
  ['fBri:bri','fCon:con','fSat:sat','fWarm:warm','fContact:contact','fSWidth:sWidth','fShX:shX','fSOp:sOp','fSBlur:sBlur','fSDist:sDist','fGloss:gloss','fRot:rot','fZoom:zoom','fOffX:offX','fPosY:posY']
    .forEach(m=>{const[id,k]=m.split(':');bindSlider(id,v=>{
      if(S.sync)S.items.forEach(x=>x.fin[k]=v);
      else it.fin[k]=v;
    })});
  // retouch nặng (full-res): áp khi thả tay
  [['fSmooth','smooth'],['fEven','even']].forEach(([id,k])=>{
    const el=$('#'+id);if(!el)return;
    el.oninput=()=>{$('#'+id+'V').textContent=el.value};
    el.onchange=()=>{const v=+el.value;
      const ap=x=>{x.fin[k]=v;dirty(x)};
      if(S.sync)S.items.forEach(ap);else ap(it);
      renderStage();
    };
  });
  on('fCopy','onclick',()=>{S.items.forEach(x=>{if(x!==it){x.fin={...it.fin};dirty(x)}});toast('Đã áp thiết lập cho tất cả');});
  // step 4
  $$('[data-son]').forEach(el=>el.onchange=()=>{S.exp.sizes[+el.dataset.son].on=el.checked;save('nsf_exp',S.exp);renderStage()});
  $$('[data-sw]').forEach(el=>el.onchange=()=>{S.exp.sizes[+el.dataset.sw].w=clamp(+el.value||1200,100,6000);save('nsf_exp',S.exp);renderStage()});
  $$('[data-sh]').forEach(el=>el.onchange=()=>{S.exp.sizes[+el.dataset.sh].h=clamp(+el.value||1200,100,6000);save('nsf_exp',S.exp);renderStage()});
  $$('[data-sdel]').forEach(el=>el.onclick=()=>{if(S.exp.sizes.length<=1){toast('Cần ít nhất một kích thước');return}
    S.exp.sizes.splice(+el.dataset.sdel,1);save('nsf_exp',S.exp);renderPanel();renderStage()});
  on('szAdd','onclick',()=>{S.exp.sizes.push({w:1000,h:1000,on:true});save('nsf_exp',S.exp);renderPanel()});
  bindSlider('exPad',v=>{S.exp.pad=v;save('nsf_exp',S.exp)});
  on('exBg','onchange',()=>{S.exp.bgMode=$('#exBg').value;save('nsf_exp',S.exp);renderPanel();renderStage()});
  on('exFmt','onchange',()=>{S.exp.fmt=$('#exFmt').value;save('nsf_exp',S.exp);renderStage()});
  bindSlider('exQ',v=>{S.exp.q=v;save('nsf_exp',S.exp)},false);
  on('exSr','onchange',()=>{S.exp.sr=$('#exSr').checked;save('nsf_exp',S.exp);
    if(S.exp.sr)toast('AI upscale bật — lần xuất đầu sẽ tải model (~65MB)')});
  on('exPat','onchange',()=>{S.exp.pat=$('#exPat').value||'{ten}_{w}x{h}';save('nsf_exp',S.exp)});
  on('exOne','onclick',exportCurrent);
  on('exAllB','onclick',exportAll);
  bindPresets();
}

/* ---------- Templates ---------- */
function saveTpl(){
  try{localStorage.setItem('nsf_tpl',JSON.stringify(S.templates.map(t=>({name:t.name,data:t.data}))))}
  catch(e){toast('Khung mẫu quá lớn để lưu — vẫn dùng được trong phiên này')}
}
$('#tplIn').onchange=async e=>{
  for(const f of e.target.files){
    const url=URL.createObjectURL(f);const img=new Image();
    await new Promise(r=>{img.onload=r;img.src=url});
    const M=600,s=Math.min(1,M/Math.max(img.width,img.height));
    const c=mk(Math.round(img.width*s),Math.round(img.height*s));
    cx(c).drawImage(img,0,0,c.width,c.height);
    S.templates.push({name:f.name.replace(/\.[^.]+$/,''),data:c.toDataURL('image/png')});
    URL.revokeObjectURL(url);
  }
  saveTpl();e.target.value='';renderPanel();
};

/* ---------- Global inputs ---------- */
$('#fileIn').onchange=e=>{addFiles(e.target.files);e.target.value=''};
$('#camIn').onchange=e=>{addFiles(e.target.files);e.target.value=''};
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();addFiles(e.dataTransfer.files)});

/* ---------- Wiring ---------- */
liqPointer();
brPointer();
crPointer();
cvPointer();
['liqSize','liqStr','brSize','brSoft'].forEach(id=>{$('#'+id).oninput=()=>$('#'+id+'V').textContent=$('#'+id).value});

$('#gpuTag').textContent=HAS_GPU?'WebGPU':'WASM';
$('#gpuTag').classList.toggle('on',HAS_GPU);
stageZoomPan();
renderAll();
</script>
